<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Timesheet Calculator</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="./app.js" defer></script>
  </head>
  <body>
    <div class="outlook-app">
      <aside class="sidebar">
        <div class="sidebar-panel">
          <div id="sidebarMiniCalendars" class="mini-calendars"></div>
        </div>

        <div class="sidebar-panel">
          <h3>My Calendars</h3>
          <div class="calendar-list">
            <div class="calendar-item active" data-calendar-key="timesheet">
              <span>Timesheet</span><strong id="timesheetCount">0</strong>
            </div>
            <div class="calendar-item" data-calendar-key="holidays">
              <span>Portuguese holidays</span><strong id="holidayCount">0</strong>
            </div>
            <div class="calendar-item" data-calendar-key="days-off">
              <span>Days off</span><strong id="daysOffCount">0</strong>
            </div>
            <div class="calendar-item" data-calendar-key="projects">
              <span>Projects</span><strong id="projectCountLabel">0</strong>
            </div>
          </div>
        </div>

        <div class="sidebar-panel">
          <h3>Month</h3>
          <div class="field-row">
            <label>
              Year
              <input id="year" type="number" min="2000" max="2100" />
            </label>
            <label>
              Workday limit
              <input id="dailyLimit" type="number" min="1" step="1" value="8" />
            </label>
          </div>
        </div>

        <div class="sidebar-panel sidebar-actions">
          <button id="calculate" type="button">Calculate timesheet</button>
        </div>
      </aside>

      <main class="workspace">
        <header class="toolbar">
          <div class="toolbar-left">
            <button id="prevMonthButton" class="toolbar-button icon" type="button" aria-label="Previous month">
              ‹
            </button>
            <button id="nextMonthButton" class="toolbar-button icon" type="button" aria-label="Next month">
              ›
            </button>
            <div class="toolbar-title" id="toolbarTitle">Month</div>
          </div>

          <div class="toolbar-right">
            <label class="toolbar-select toolbar-month-select">
              <span>Month</span>
              <select id="month"></select>
            </label>
          </div>
        </header>

        <section class="calendar-shell">
          <div id="calendar" class="calendar"></div>
          <div id="summary" class="summary-grid"></div>
        </section>

        <section class="controls">
          <section class="panel">
            <div class="panel-heading">
              <h2>Days off</h2>
              <button id="addDayOff" class="secondary" type="button">Add day off</button>
            </div>
            <p class="hint">
              Add as many single days or date ranges as needed. A date range can cover a full week.
            </p>
            <div id="dayOffList" class="stack"></div>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <h2>Projects</h2>
              <div class="inline-controls">
                <label>
                  Count
                  <input id="projectCount" type="number" min="1" step="1" value="2" />
                </label>
                <button id="syncProjects" class="secondary" type="button">Build rows</button>
              </div>
            </div>
            <p class="hint">
              Enter the total hours worked on each project for the selected month.
            </p>
            <div id="projectList" class="stack"></div>
          </section>
        </section>
      </main>
    </div>
  </body>
</html>
